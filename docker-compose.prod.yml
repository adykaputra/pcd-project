services:
  firewall:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: privacy_firewall_prod
    environment:
      - PYTHONPATH=/usr/src/app
      - FLASK_ENV=production
      - LLM_DEFAULT_PROVIDER=${LLM_DEFAULT_PROVIDER:-mock}
      - JWT_SECRET=${JWT_SECRET}
      - AUDIT_HMAC_KEY=${AUDIT_HMAC_KEY}
      - PII_VAULT_KEY=${PII_VAULT_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    ports:
      - "5100:5000"
    volumes:
      - firewall_data:/usr/src/app/data
    healthcheck:
      test: ["CMD", "conda", "run", "--no-capture-output", "-n", "pcd", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=3).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  firewall_data:
