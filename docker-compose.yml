services:
  flask:
    # Development stack (hot reload + mounted source)
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flask_app
    working_dir: /usr/src/app
    environment:
      - PYTHONPATH=/usr/src/app
      - FLASK_APP=app:create_app
      - FLASK_ENV=development
      - LLM_DEFAULT_PROVIDER=mock
      - JWT_SECRET=${JWT_SECRET:-very-secret}
      - AUDIT_HMAC_KEY=${AUDIT_HMAC_KEY:-audit-secret}
      - PII_VAULT_KEY=${PII_VAULT_KEY:-dev-vault-key-change-me}
    volumes:
      - ./:/usr/src/app
    ports:
      - "5100:5000"
    command: ["conda", "run", "--no-capture-output", "-n", "pcd", "flask", "--app", "app:create_app", "run", "--host=0.0.0.0", "--port=5000", "--reload"]
    healthcheck:
      test: ["CMD", "conda", "run", "--no-capture-output", "-n", "pcd", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=3).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: on-failure:3
    depends_on:
      - flask_db

  flask_db:
    image: postgres:latest
    container_name: flask_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: flaskdb
    ports:
      - "5432:5432"
    volumes:
      - flask_db_data:/var/lib/postgresql/data

volumes:
  flask_db_data:
