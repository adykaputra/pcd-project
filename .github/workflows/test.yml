name: CI Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker cache
        run: docker info || true

      - name: Run dockerized tests (make test)
        run: make test

  pytest-report:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-activate-base: false

      - name: Create conda env from environment.yml
        run: conda env create -f environment.yml

      - name: Run pytest with JUnit XML report
        run: |
          mkdir -p reports
          conda run -n pcd pytest -q --junitxml=reports/junit.xml || true
        continue-on-error: true

      - name: Upload JUnit report artifact
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: reports/junit.xml

      - name: Publish test report to PR (annotations)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: pytest
          path: reports/junit.xml
          reporter: junit

  privacy-benchmark-gate:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-activate-base: false
          environment-file: environment.yml
          environment-name: pcd

      - name: Run privacy benchmark quality gate
        run: |
          mkdir -p reports
          conda run -n pcd python scripts/check_benchmark_gate.py \
            --dataset-version v2 \
            --split all \
            --max-leak-rate 0.05 \
            --min-utility-score 0.75 \
            --max-latency-ms 100 \
            --min-detection-rate 0.6 \
            --min-expected-action-accuracy 0.3 | tee reports/privacy-benchmark-gate.log

      - name: Upload benchmark gate report
        uses: actions/upload-artifact@v4
        with:
          name: privacy-benchmark-gate
          path: reports/privacy-benchmark-gate.log
